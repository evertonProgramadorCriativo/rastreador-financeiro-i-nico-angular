server {
    listen 80;
    server_name localhost;

    # Pasta raiz dos arquivos compilados pelo ionic build
    root /usr/share/nginx/html;
    index index.html;

    # Compressão gzip para assets estáticos
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # Cache longo para assets com hash no nome (bundle.abc123.js)
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — todas as rotas vão para index.html
    # Necessário para o Angular Router funcionar no refresh
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Segurança: oculta versão do Nginx
    server_tokens off;

    # Headers de segurança básicos
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
}